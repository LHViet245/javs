# ─────────────────────────────────────────────────────────────────
# JavS Default Configuration
# Auto-aligned with JavsConfig Pydantic schema
# ─────────────────────────────────────────────────────────────────

config_version: 1

# Processing limits
throttle_limit: 1   # Max concurrent scraping tasks
sleep: 2            # Global scrape cooldown; keep 2s because recent benchmarks still favor it

# ─── File Locations ──────────────────────────────────────────────
locations:
  input: ""         # Reserved path field; built-in CLI still expects explicit sort SOURCE arguments
  output: ""        # Reserved path field; built-in CLI still expects explicit sort DEST arguments
  thumb_csv: ""     # Custom path to actress thumbnail CSV
  genre_csv: ""     # Custom path to genre replacement CSV
  log: ""           # Custom log file path

# ─── File Matching ───────────────────────────────────────────────
match:
  mode: auto         # auto = flexible built-in regex, strict = precision-first, custom = use the regex below
  minimum_file_size_mb: 0
  included_extensions:
    - .asf
    - .avi
    - .flv
    - .m4v
    - .mkv
    - .mp4
    - .mov
    - .rmvb
    - .wmv
  excluded_patterns:
    - "^.*-trailer*"
    - "^.*-5\\."
  regex_enabled: false
  regex:
    pattern: "([a-zA-Z|tT28]+-\\d+[zZ]?[eE]?)(?:-pt)?(\\d{1,2})?"
    id_match_group: 1
    part_match_group: 2

# ─── Scrapers ────────────────────────────────────────────────────
scrapers:
  # Enable/disable individual scrapers
  enabled:
    r18dev: true
    dmm: true
    javlibrary: false
    javlibraryja: false
    javlibraryzh: false
    mgstageja: false

  # Per-scraper proxy routing (only effective when proxy.enabled is true)
  # DMM and MGStage default to true (Japan region block bypass)
  use_proxy:
    r18dev: false
    dmm: true
    javlibrary: false
    javlibraryja: false
    javlibraryzh: false
    mgstageja: true

# ─── Sort / Organization ────────────────────────────────────────
sort:
  move_to_folder: true
  rename_file: true
  move_subtitles: true
  cleanup_empty_source_dir: false

  # Naming format templates
  # Available tokens: {id}, {title}, {maker}, {studio}, {label},
  #                   {series}, {year}, {director}, {actresses}
  format:
    file: "{id}"
    folder: "{id} [{studio}] - {title} ({year})"
    poster_img:
      - folder
    thumb_img: fanart
    trailer_vid: "{id}-trailer"
    nfo: "{id}"
    screenshot_img: fanart
    screenshot_padding: 1
    screenshot_folder: extrafanart
    actress_img_folder: ".actors"
    delimiter: ", "
    max_title_length: 100

  # Media download toggles
  download:
    actress_img: false
    thumb_img: true
    poster_img: true
    screenshot_img: false
    trailer_vid: false
    timeout_seconds: 100

  # Metadata settings
  metadata:
    nfo:
      create: true
      per_file: true
      add_aliases: false
      add_generic_role: true
      alt_name_role: false
      display_name: "[{id}] {title}"
      first_name_order: false
      actress_language_ja: false
      unknown_actress: true
      original_path: false
      actress_as_tag: false
      prefer_actress_alias: false
      media_info: false
      format_tag:
        - "{set}"
      format_tagline: ""
      format_credits: []
      translate:
        enabled: false
        module: googletrans    # "googletrans" or "deepl"
        fields:
          - description
        language: en-us        # DeepL users should prefer exact targets like "en-us", "en-gb", "pt-br", or "zh-hans"
        deepl_api_key: ""
        keep_original_description: false
        affect_sort_names: false

    # Metadata field priority across scrapers (first match wins)
    priority:
      actress:
        - r18dev
        - dmm
        - javlibrary
      alternate_title:
        - javlibraryja
        - dmm
      cover_url:
        - r18dev
        - javlibrary
        - dmm
      description:
        - dmm
        - r18dev
        - mgstageja
      director:
        - r18dev
        - javlibrary
        - mgstageja
      genre:
        - r18dev
        - javlibrary
      id:
        - r18dev
        - javlibrary
      content_id:
        - r18dev
        - dmm
      label:
        - r18dev
        - javlibrary
        - mgstageja
      maker:
        - r18dev
        - javlibrary
      release_date:
        - r18dev
        - javlibrary
        - dmm
      rating:
        - dmm
        - javlibrary
        - mgstageja
      runtime:
        - r18dev
        - javlibrary
        - dmm
      series:
        - r18dev
        - mgstageja
      screenshot_url:
        - r18dev
        - javlibrary
        - dmm
      title:
        - r18dev
        - javlibrary
      trailer_url:
        - r18dev
        - dmm

    # CSV-based metadata overrides
    thumb_csv:
      enabled: true
      auto_add: true
      convert_alias: true
    genre_csv:
      enabled: false
      auto_add: false
      ignored_patterns:
        - "^Featured Actress"
        - "^Hi-Def"
        - ".*sale.*"
        - ".*mosaic.*"
    # Required fields — movie is skipped if these are missing
    required_fields:
      - id
      - cover_url
      - genres
      - maker
      - release_date
      - title

# ─── Proxy Configuration ────────────────────────────────────────
# Supports: HTTP, HTTPS, SOCKS5, SOCKS5h
proxy:
  enabled: false
  # Format: protocol://[user:pass@]host:port
  # HTTP:    http://1.2.3.4:8080
  # Auth:    http://myuser:mypass@1.2.3.4:8080
  # SOCKS5:  socks5://127.0.0.1:10808
  # SOCKS5h: socks5h://1.2.3.4:1080 (proxy resolves DNS)
  url: ""
  timeout_seconds: 15
  max_retries: 3

# ─── Emby / Jellyfin ────────────────────────────────────────────
emby:
  url: "http://192.168.0.1:8096"
  api_key: ""

# ─── Javlibrary-specific ────────────────────────────────────────
# Cloudflare bypass: paste only the values that JavS actually consumes.
javlibrary:
  base_url: "https://www.javlibrary.com"
  browser_user_agent: ""
  cookie_cf_clearance: ""

# ─── Logging ─────────────────────────────────────────────────────
log:
  enabled: true
  level: info    # debug, info, warning, error
