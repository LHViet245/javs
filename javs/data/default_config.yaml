movie:
  # Metadata fields to extract and prioritize
  # If a field is present from multiple scrapers, the first one in the list wins.
  title:
    - dmm
    - javlibrary
    - r18dev
  actress:
    - r18dev
    - dmm
    - javlibrary
  alternate_title:
    - dmm
    - javlibraryja
  trailer_url:
    - r18dev
    - dmm
    - javlibrary
  cover_url:
    - dmm
    - r18dev
    - javlibrary
  description:
    - dmm
    - r18dev
    - mgstage
  director:
    - r18dev
    - javlibrary
    - dmm
    - mgstage
  genres:
    - javlibrary
    - dmm
    - r18dev
  label:
    - r18dev
    - dmm
    - javlibrary
  maker:
    - r18dev
    - javlibrary
    - dmm
  release_date:
    - dmm
    - r18dev
    - javlibrary
  runtime_minutes:
    - dmm
    - r18dev
    - javlibrary
  series:
    - dmm
    - javlibrary
    - r18dev
  screenshots:
    - dmm
    - r18dev
    - javlibrary
  rating:
    - javlibrary
  cid:
    - dmm
  user_rating:
    - javlibrary

file:
  scraper_priorities:
    - dmm
    - r18dev
    - javlibrary
  minimum_file_size_mb: 0
  included_extensions:
    - .asf
    - .avi
    - .flv
    - .m4v
    - .mkv
    - .mp4
    - .mov
    - .rmvb
    - .wmv
  excluded_patterns: []
  uncensored_patterns:
    - uncen
    - uncensored
    - 1pon
    - 1pondo
    - 10musume
    - 10mu
    - heyzo
    - pacopacomama
    - pacopaco
    - paco
    - muramura
    - caribbean
    - carib
    - tokyohot
    - tkht

sort:
  # Base sorting configurations
  rename_file: true
  move_subtitles: true
  rename_file_format: "<id> - <title>"
  rename_folder: true
  rename_folder_format: "<id>"
  move_to: "" # Empty means don't move
  create_nfo: true
  download_cover: true
  download_screenshots: false
  max_path_length: 250
  
  # Cover/Poster processing rules
  cover:
    crop: true
    convert_to_jpg: true
    resize: false
    resize_width: 800
    resize_height: 1200
    quality: 100

emby:
  enabled: false
  url: "http://localhost:8096"
  api_key: ""
  update_library: true
  refresh_metadata: true

translation:
  enabled: false
  engine: "google" # google or deepl
  target_language: "en"
  deepl_api_key: ""
  fields_to_translate:
    - description
    - genres
    - title

scraper_settings:
  javlibrary:
    # Optional settings specific to individual scrapers
    bluray_priority: true

# Per-scraper proxy routing (only effective when proxy.enabled is true)
# DMM and MGStage default to true (Japan region block bypass)
scraper_proxy:
  dmm: true
  mgstageja: true
  javlibrary: false
  r18dev: false

log:
  enabled: true
  level: info

cloudflare:
  # Method: "cloudscraper" (automatic) or "manual" (user-provided cookies)
  method: cloudscraper
  # Manual mode only: paste cf_clearance cookie + User-Agent from browser DevTools
  cf_clearance: ""
  user_agent: ""

# Proxy configuration
# Supports: HTTP, HTTPS, SOCKS5, SOCKS5h
proxy:
  enabled: false
  # Format: protocol://[user:pass@]host:port
  # HTTP:    http://1.2.3.4:8080
  # Auth:    http://myuser:mypass@1.2.3.4:8080
  # SOCKS5:  socks5://127.0.0.1:10808
  # SOCKS5h: socks5h://1.2.3.4:1080 (proxy resolves DNS)
  url: "socks5://127.0.0.1:1080"
  timeout_seconds: 15
  max_retries: 3

throttle_limit: 1
sleep: 3
